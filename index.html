<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>Dark Pad Pro V5 - Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #050a0f; color: #e2e8f0; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }
        .bg-pure-black { background-color: #000000 !important; }
        .bg-dark-gray { background-color: #1c2833 !important; }
        .note-card { border-radius: 1.5rem; height: 160px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s; position: relative; }
        .is-pinned { border: 2px solid #f97316 !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .action-bar { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 1rem; }
        textarea { background: transparent !important; color: white !important; width: 100%; height: 300px; border: none; outline: none; padding: 1.5rem; resize: none; line-height: 1.5; }
        input[type="text"] { background: transparent; border: none; outline: none; color: white; }
    </style>
</head>
<body x-data="notesApp()" x-init="init()" :class="config.pureBlack ? 'bg-pure-black' : ''">

    <header class="p-6 pb-2 sticky top-0 z-50 bg-inherit border-b border-white/5">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-xl font-black text-orange-500 italic uppercase">Dark Pad</h1>
                <p class="text-[9px] font-black text-sky-500 uppercase tracking-widest">Herramientas Pro</p>
            </div>
            <button @click="showSettings = true" class="p-2 bg-white/5 rounded-full"><span class="material-symbols-outlined text-sky-400">settings</span></button>
        </div>
        
        <div class="action-bar p-2 flex items-center justify-between gap-2 overflow-hidden">
            <div class="flex items-center gap-1">
                <button @click="ui.showSearch = !ui.showSearch" class="p-2 hover:bg-white/10 rounded-lg">
                    <span class="material-symbols-outlined text-sky-400">search</span>
                </button>
                <input x-show="ui.showSearch" x-model="search" type="text" placeholder="Buscar..." class="w-24 text-xs transition-all">
                
                <button @click="ui.showMenu = !ui.showMenu" class="p-1 hover:bg-white/10 rounded-lg transition-transform" :class="ui.showMenu ? 'rotate-180' : ''">
                    <span class="material-symbols-outlined text-white/40">expand_more</span>
                </button>
            </div>

            <div class="flex items-center gap-3 pr-2">
                <span @click="archivarNota()" class="material-symbols-outlined text-[18px] text-white/60">inventory_2</span>
                <span @click="activarRecordatorio()" class="material-symbols-outlined text-[18px] text-white/60">notifications</span>
                <span @click="cambiarTamano()" class="material-symbols-outlined text-[18px] text-white/60">format_size</span>
                <span @click="bloquearApp()" class="material-symbols-outlined text-[18px] text-white/60">lock</span>
                <div class="w-[1px] h-4 bg-white/10 mx-1"></div>
                <span @click="togglePin()" class="material-symbols-outlined text-[18px] text-orange-500">push_pin</span>
                <span @click="borrarNotaRapido()" class="material-symbols-outlined text-[18px] text-red-500">delete</span>
                <span @click="volver()" class="material-symbols-outlined text-[18px] text-white/60">arrow_back</span>
            </div>
        </div>

        <div x-show="ui.showMenu" x-transition x-cloak class="mt-2 p-4 bg-[#0f172a] rounded-xl border border-white/10 shadow-2xl">
            <div class="grid grid-cols-2 gap-4 text-[10px] font-black uppercase">
                <button @click="abrirCalendarioArchivado()" class="flex flex-col items-center gap-2 p-3 bg-white/5 rounded-lg border border-white/5">
                    <span class="material-symbols-outlined text-orange-400">calendar_month</span>
                    Archivo Histórico
                </button>
                <button @click="cambiarTamano()" class="flex flex-col items-center gap-2 p-3 bg-white/5 rounded-lg border border-white/5">
                    <span class="material-symbols-outlined text-sky-400">text_fields</span>
                    Tamaño: <span x-text="config.fontSize + 'px'"></span>
                </button>
            </div>
        </div>
    </header>

    <section class="px-6 py-3 bg-white/5 overflow-x-auto whitespace-nowrap hide-scrollbar border-b border-white/5">
        <div class="flex gap-4">
            <template x-for="day in last7Days" :key="day.date">
                <div @click="filterByDate(day.date)" 
                     class="flex flex-col items-center min-w-[45px] p-2.5 rounded-2xl transition-all"
                     :class="selectedDate === day.date ? 'bg-sky-500 text-white' : 'bg-white/5'">
                    <span class="text-[8px] uppercase font-black opacity-50" x-text="day.name"></span>
                    <span class="text-sm font-black" x-text="day.num"></span>
                    <div x-show="day.hasNote" class="w-1 h-1 rounded-full mt-1 bg-orange-500"></div>
                </div>
            </template>
        </div>
    </section>

    <main class="p-4 grid grid-cols-2 gap-4 h-[calc(100vh-230px)] overflow-y-auto pb-32 hide-scrollbar">
        <template x-for="nota in notasFiltradas" :key="nota.id">
            <div class="note-card p-5 flex flex-col justify-between" 
                 :class="[nota.estilo, nota.pinned ? 'is-pinned' : '']"
                 @click="abrirNota(nota)">
                <p class="font-bold line-clamp-4 leading-tight" :style="{ fontSize: config.fontSize + 'px' }" x-text="nota.texto || '...'"></p>
                <div class="flex justify-between items-center opacity-40 text-[9px] font-black uppercase">
                    <span x-text="nota.fecha"></span>
                    <span x-show="nota.pinned" class="material-symbols-outlined text-[12px]">push_pin</span>
                </div>
            </div>
        </template>
    </main>

    <div x-show="notaExpandida" x-transition x-cloak class="fixed inset-0 bg-black/95 z-[200] flex flex-col p-4">
        <div class="w-full max-w-lg mx-auto rounded-[2rem] overflow-hidden flex flex-col h-full shadow-2xl" :class="notaExpandida?.estilo">
            <div class="p-6 flex justify-between items-center border-b border-white/10">
                <span class="text-[10px] font-black uppercase opacity-50" x-text="notaExpandida?.fecha"></span>
                <button @click="cerrarNota()" class="w-10 h-10 bg-black/20 rounded-full flex items-center justify-center"><span class="material-symbols-outlined">close</span></button>
            </div>
            
            <div class="px-6 pt-4">
                <input x-model="notaExpandida.titulo" type="text" placeholder="Título de la nota..." class="text-lg font-black w-full bg-white/5 p-3 rounded-xl border border-white/10 mb-2">
            </div>

            <textarea x-model="notaExpandida.texto" placeholder="Escribe aquí..." :style="{ fontSize: config.fontSize + 'px' }"></textarea>
            
            <div class="p-4 flex justify-around bg-black/20">
                <button @click="togglePin()"><span class="material-symbols-outlined" :class="notaExpandida?.pinned ? 'text-orange-500' : 'text-white/40'">push_pin</span></button>
                <button @click="activarRecordatorio()"><span class="material-symbols-outlined text-white/40">notifications</span></button>
                <button @click="borrarNotaRapido()"><span class="material-symbols-outlined text-red-400">delete</span></button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-8 right-6">
        <button @click="nuevaNota()" class="w-16 h-16 bg-orange-600 rounded-2xl flex items-center justify-center shadow-2xl shadow-orange-900/40 active:scale-90 transition-transform">
            <span class="material-symbols-outlined text-black font-black text-4xl">add</span>
        </button>
    </div>

    <script>
        function notesApp() {
            return {
                notas: [], notaExpandida: null, search: '', selectedDate: null,
                ui: { showMenu: false, showSearch: false },
                config: { fontSize: 16, pureBlack: false },
                estilos: ['bg-dark-gray', 'bg-dark-orange', 'bg-dark-blue', 'bg-dark-green', 'bg-dark-purple'],

                init() {
                    this.notas = JSON.parse(localStorage.getItem('darkpad_v5_final') || '[]');
                },

                get notasFiltradas() {
                    return this.notas.filter(n => {
                        const txt = (n.texto + (n.titulo || '')).toLowerCase();
                        const matchesSearch = txt.includes(this.search.toLowerCase());
                        const matchesDate = !this.selectedDate || n.fecha.includes(this.selectedDate);
                        return matchesSearch && matchesDate;
                    }).sort((a,b) => b.pinned - a.pinned || b.id - a.id);
                },

                nuevaNota() {
                    const ahora = new Date();
                    const n = { 
                        id: Date.now(), titulo: '', texto: '', 
                        fecha: ahora.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) + ' ' + ahora.toLocaleDateString([], {day:'2-digit', month:'2-digit'}), 
                        estilo: this.estilos[Math.floor(Math.random()*this.estilos.length)], 
                        pinned: false 
                    };
                    this.notas.unshift(n);
                    this.abrirNota(n);
                },

                abrirNota(n) { this.notaExpandida = n; },
                cerrarNota() { this.guardar(); this.notaExpandida = null; },
                guardar() { localStorage.setItem('darkpad_v5_final', JSON.stringify(this.notas)); },
                
                // Funciones de la barra de acciones
                togglePin() { if(this.notaExpandida) this.notaExpandida.pinned = !this.notaExpandida.pinned; },
                borrarNotaRapido() { if(confirm("¿Eliminar?")) { this.notas = this.notas.filter(n => n.id !== (this.notaExpandida?.id || -1)); this.cerrarNota(); } },
                cambiarTamano() { 
                    const tamaños = [14, 16, 20, 24];
                    let idx = tamaños.indexOf(this.config.fontSize);
                    this.config.fontSize = tamaños[(idx + 1) % tamaños.length];
                },
                bloquearApp() { alert("App bloqueada. Introduce código."); },
                volver() { window.history.back() || (this.selectedDate = null, this.search = ''); },
                
                get last7Days() {
                    const days = [];
                    for(let i=0; i<7; i++) {
                        const d = new Date(); d.setDate(d.getDate() - i);
                        const dStr = d.toLocaleDateString([], {day:'2-digit', month:'2-digit'});
                        days.push({ date: dStr, num: d.getDate(), name: d.toLocaleDateString([], {weekday:'short'}), hasNote: this.notas.some(n => n.fecha.includes(dStr)) });
                    }
                    return days;
                },
                filterByDate(date) { this.selectedDate = (this.selectedDate === date) ? null : date; }
            }
        }
    </script>
</body>
</html>
